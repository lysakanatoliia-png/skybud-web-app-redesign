name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Дозволяємо ручний запуск з вкладки Actions
  workflow_dispatch:

# Дозволяємо одночасно один деплой; нові пуші — скасовують попередні незавершені
concurrency:
  group: "pages"
  cancel-in-progress: false

# Дозволи для GITHUB_TOKEN — запис на gh-pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm install

      - name: Build
        run: npm run build

      # Для SPA-router'а на GH Pages потрібен 404.html що віддає index.html
      - name: Copy index.html to 404.html (SPA fallback)
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
